version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ncc_exam_portal}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-ncc_exam_portal}?schema=public
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_token}
      PORT: 3000
      NODE_ENV: production
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      CLIENT_URLS: ${CLIENT_URLS:-http://localhost:5173}
      REDIS_URL: redis://redis:6379
      FEATURE_COOKIE_AUTH: ${FEATURE_COOKIE_AUTH:-true}
      FEATURE_STRICT_EXAM_SESSION: ${FEATURE_STRICT_EXAM_SESSION:-true}
      FEATURE_TIMEOUT_AUTO_CLOSE: ${FEATURE_TIMEOUT_AUTO_CLOSE:-true}
      FEATURE_SOFT_DELETE_USERS: ${FEATURE_SOFT_DELETE_USERS:-true}
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_API_PREFIX: /api
      VITE_COOKIE_AUTH: true
    depends_on:
      - backend

volumes:
  postgres_data:
